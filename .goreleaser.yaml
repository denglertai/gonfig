# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# GoReleaser configuration using Zig for CGO cross-compilation
version: 2

project_name: gonfig

builds:
  # Linux AMD64
  - id: linux-amd64
    env:
      - CGO_ENABLED=1
      - CC=zig cc -target x86_64-linux-gnu
      - CXX=zig c++ -target x86_64-linux-gnu
    goos:
      - linux
    goarch:
      - amd64
    flags:
      - -trimpath
    ldflags:
      - -s -w

  # Linux ARM64
  - id: linux-arm64
    env:
      - CGO_ENABLED=1
      - CC=zig cc -target aarch64-linux-gnu
      - CXX=zig c++ -target aarch64-linux-gnu
    goos:
      - linux
    goarch:
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w

  # Windows AMD64
  - id: windows-amd64
    env:
      - CGO_ENABLED=1
      - CC=zig cc -target x86_64-windows-gnu
      - CXX=zig c++ -target x86_64-windows-gnu
    goos:
      - windows
    goarch:
      - amd64
    flags:
      - -trimpath
      - -buildmode=exe
    ldflags:
      - -s -w

archives:
  - format: tar.gz
    # this name template makes the OS and Arch compatible with the results of `uname`.
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    # use zip for windows archives
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  github:
    owner: denglertai
    name: gonfig
  draft: true
  prerelease: auto
  make_latest: true
  header: |
    ## Release {{ .Tag }}
    
    Multi-architecture binaries built with CGO enabled using Zig {{ .Env.ZIG_VERSION | default "0.15.2" }}
  footer: |
    **Full Changelog**: https://github.com/denglertai/gonfig/compare/{{ .PreviousTag }}...{{ .Tag }}

sboms:
  - artifacts: binary
    args: ["$artifact", "--output", "cyclonedx-json=$document"]
