name: goreleaser

on:
  push:
    # Pattern matched against refs/tags
    tags:        
      - '**'           # Push events to every tag including hierarchical tags like v1.0/beta

permissions:
  contents: write
  # packages: write
  # issues: write
  # id-token: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: Install Linux ARM64 cross-toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu binutils-aarch64-linux-gnu
      - name: Install Zig for CGO cross-compilation
        run: |
          wget -q https://ziglang.org/download/0.15.2/zig-x86_64-linux-0.15.2.tar.xz
          tar xf zig-x86_64-linux-0.15.2.tar.xz
          sudo mv zig-x86_64-linux-0.15.2 /usr/local/zig
          rm zig-x86_64-linux-0.15.2.tar.xz
          echo "/usr/local/zig" >> $GITHUB_PATH
      - name: Verify Zig installation
        run: zig version
      - name: Set Zig version env var
        run: echo "ZIG_VERSION=$(zig version)" >> $GITHUB_ENV
      - name: Check if release already exists
        id: release-check
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "⚠️  Release for tag ${GITHUB_REF_NAME} already exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "✅ No existing release found"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Delete existing release if present
        if: steps.release-check.outputs.exists == 'true'
        run: |
          echo "Deleting existing release ${GITHUB_REF_NAME}..."
          gh release delete "${GITHUB_REF_NAME}" --yes --cleanup-tag=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup syft
        uses: anchore/sbom-action/download-syft@latest # installs syft
      # More assembly might be required: Docker logins, GPG, etc.
      # It all depends on your needs.
      - name: Run GoReleaser with Zig
        uses: goreleaser/goreleaser-action@v7
        with:
          # either 'goreleaser' (default) or 'goreleaser-pro'
          distribution: goreleaser
          # 'latest', 'nightly', or a semver
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    needs: goreleaser
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            goarch: amd64
            archive_arch: x86_64
          - runner: macos-latest
            goarch: arm64
            archive_arch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: Build Darwin binary with CGO
        run: |
          mkdir -p dist/darwin-${{ matrix.goarch }}
          if [ "${{ matrix.goarch }}" = "amd64" ]; then
            export CC="clang -target x86_64-apple-darwin"
            export CXX="clang++ -target x86_64-apple-darwin"
          else
            export CC=clang
            export CXX=clang++
          fi
          CGO_ENABLED=1 GOOS=darwin GOARCH=${{ matrix.goarch }} \
            go build -trimpath -ldflags "-s -w" -o dist/darwin-${{ matrix.goarch }}/gonfig .
          cp LICENSE dist/darwin-${{ matrix.goarch }}/LICENSE
          tar -C dist/darwin-${{ matrix.goarch }} -czf dist/gonfig_Darwin_${{ matrix.archive_arch }}.tar.gz gonfig LICENSE
      - name: Upload Darwin archive artifact
        uses: actions/upload-artifact@v7
        with:
          name: darwin-${{ matrix.goarch }}
          path: dist/gonfig_Darwin_${{ matrix.archive_arch }}.tar.gz

  upload-macos-assets:
    needs: build-macos
    runs-on: ubuntu-latest
    steps:
      - name: Download Darwin archives
        uses: actions/download-artifact@v8
        with:
          path: dist-macos
      - name: Upload Darwin archives to release
        run: |
          set -euo pipefail
          mapfile -t existing < <(gh release view "${GITHUB_REF_NAME}" --json assets --jq '.assets[].name')
          shopt -s globstar nullglob
          for file in dist-macos/**/*.tar.gz; do
            name=$(basename "$file")
            if printf '%s\n' "${existing[@]}" | grep -qx "$name"; then
              echo "Skipping existing asset: $name"
            else
              echo "Uploading asset: $name"
              gh release upload "${GITHUB_REF_NAME}" "$file"
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}